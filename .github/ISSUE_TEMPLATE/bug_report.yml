name: Bug Report
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: ai-tool
    attributes:
      label: AI Tool
      description: Which AI tool are you using?
      options:
        - Claude Code
        - Cursor
        - Cline
        - Windsurf
        - OpenClaw
        - Other
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: "Output of `python3 --version`"
      placeholder: "3.12.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows (WSL)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "The agent failed to login after setup_account..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `/play-fishing-frenzy`
        2. Agent calls setup_account()
        3. Error appears...
    validations:
      required: true

  - type: textarea
    id: agent-output
    attributes:
      label: Agent output
      description: Copy-paste the relevant agent output or error message.
      render: text
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: false
